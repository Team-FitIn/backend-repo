# 1. 공통 설정 (포트, 인코딩, DB 연결 기초)
server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      force: true      # spring.http.encoding.force를 대체하는 최신 설정
      enabled: true

spring:
  # 데이터베이스 공통 설정 (환경 변수 사용)
  datasource:
    url: ${DB_JDBC_URL}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 공통 설정
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        highlight_sql: true
    open-in-view: false

  # 스웨거(SpringDoc) 한글 및 경로 설정
  springdoc:
    default-consume-media-type: application/json;charset=UTF-8
    default-produce-media-type: application/json;charset=UTF-8
    swagger-ui:
      path: /swagger-ui.html
      disable-swagger-default-url: true
      display-request-duration: true
    api-docs:
      path: /v3/api-docs

# 외부 서비스 연동 (AI 서버 등)
external:
  ai:
    base-url: ${AI_URL:http://localhost:8000}

---
# 2. 로컬 개발 환경 (Local / Default)
spring:
  config:
    activate:
      on-profile: default
  jpa:
    hibernate:
      ddl-auto: create # 로컬에서는 엔티티 수정 시 DB 자동 반영

frontend:
  target-url: "http://localhost:5173/oauth2/redirect"

---
# 3. 운영 환경 (AWS / Production)
spring:
  config:
    activate:
      on-profile: aws
  jpa:
    hibernate:
      ddl-auto: validate # 운영 서버에서는 테이블 구조 체크만 수행

frontend:
  target-url: "https://fitin-app.vercel.app/oauth2/redirect"

---
# 4. 보안 및 소셜 로그인 설정 (중요 키 관리)
keys:
  jwt:
    secret: ${JWT_SECRET:very_secret_key_random_string_over_32_chars_fitin_project}
    access-token-validity-in-milliseconds: ${JWT_ACCESS_TOKEN_VALIDITY:3600000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:temp_google_id}
    client-secret: ${GOOGLE_CLIENT_SECRET:temp_google_secret}
    redirect-uri: "{baseUrl}/login/oauth2/code/google"
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:temp_kakao_key}
    client-secret: ${KAKAO_CLIENT_SECRET:temp_kakao_secret}
    redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
---
# 5. OAuth2 설정
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          # 🌟 [업데이트 완료]: 구글 전용 프로바이더 계층 정교하게 추가 완료
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
